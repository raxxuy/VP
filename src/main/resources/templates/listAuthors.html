<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Book Reservation - Welcome and choose a Book</title>
    <style type="text/css">
        body {
            width: 800px;
            margin: auto;
            font-family: Arial, sans-serif;
        }
        h1 {
            color: #333;
        }
        form {
            margin-top: 20px;
        }
        .book-option {
            margin: 10px 0;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .book-option:hover {
            background-color: #f5f5f5;
        }
    </style>
</head>
<body>
<header>
    <h1>Welcome to our Book Reservation App</h1>
</header>
<main>
   <form>
       <div th:each="author : ${authors}">
           <div class="book-entry">
               <label th:text="|Name: ${author.getName()}, Surname: ${author.getSurname()}, Country: ${author.getCountry()}, Biography: ${author.getBiography()}|">

               </label>

               <button type="submit" name="edit" th:formaction="|/authors/author-form/${author.getId()}|" formmethod="get" formnovalidate>
                   Edit
               </button>

               <button type="submit" name="delete" th:formaction="|/authors/delete/${author.getId()}|" formmethod="post" formnovalidate>
                   Delete
               </button>
           </div>
       </div>

       <button type="submit" name="addAuthor" formaction="/authors/author-form" formmethod="get" formnovalidate>
           Add Author
       </button>
   </form>
</main>
</body>
</html>
